name: Bug Report
description: Report a reproducible bug in x-workbench.
title: "[bug] "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug. Please provide enough detail so we can reproduce and fix it quickly.

  - type: input
    id: tool
    attributes:
      label: Tool
      description: Which tool is affected? (for example, logo_generator)
      placeholder: logo_generator
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment
      description: OS / Python version / runtime details.
      placeholder: macOS 15, Python 3.13, uv 0.x
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Exact commands and actions to reproduce.
      placeholder: |
        1. make serve TOOL=logo_generator
        2. Open http://127.0.0.1:8000
        3. ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      placeholder: What should happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      placeholder: What actually happened?
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Screenshots
      description: Paste relevant logs, stack traces, or screenshots.
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Pre-check
      options:
        - label: I searched existing issues and did not find a duplicate.
          required: true
